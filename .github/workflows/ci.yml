name: CI

# Tests run on PRs only — main is covered by publish.yml's own test gate
# before it tags/publishes, so a second run here would be redundant.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
